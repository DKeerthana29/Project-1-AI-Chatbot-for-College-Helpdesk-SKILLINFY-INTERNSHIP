<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduMind | Contact Us</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
body { font-family: 'Jost', sans-serif; background: #fafafa; margin:0; padding:0; color: #333; }
.header { background: #000; padding: 20px 40px; color: #fff; text-transform:uppercase; font-size:12px; font-weight:600;}
.header a { color: #aaa; text-decoration:none; margin-right:20px; font-size:14px; transition:0.3s;}
.header a:hover { color:#fff; }
.hero-banner { background: #B20738; color: white; padding: 60px 40px; text-align: center; }
.hero-banner h1 { font-family: 'Oswald', sans-serif; font-size: 48px; text-transform: uppercase; margin:0;}
.container { max-width: 1000px; margin: 50px auto; padding: 0 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
.contact-info { background: #fff; padding: 40px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
.contact-info h3 { font-size: 24px; color: #111; margin-bottom: 20px;}
.info-row { display: flex; gap: 15px; margin-bottom: 20px; align-items:flex-start; }
.info-row i { color: #B20738; font-size: 20px; margin-top:3px;}
.contact-form { display: flex; flex-direction: column; gap: 15px; }
.contact-form input, .contact-form textarea { width: 100%; padding: 15px; border: 1px solid #ddd; border-radius: 8px; font-family:inherit; font-size:15px; background:#fff;}
.contact-form button { background: #111; color: #fff; border: none; padding: 15px; border-radius: 30px; font-weight: 600; cursor: pointer; transition: 0.3s; font-size: 16px;}
.contact-form button:hover { background: #B20738; }
</style>
</head>
<body>
<div class="header"><a href="index.html"><i class="fa fa-arrow-left"></i> Home</a> <span>Helpdesk</span></div>
<div class="hero-banner"><h1>Contact Admissions</h1><p style="margin-top:10px; font-size:18px;">We're here to answer every question about your future.</p></div>
<div class="container">
  <div class="contact-info">
    <h3>Headquarters</h3>
    <div class="info-row"><i class="fa fa-map-marker-alt"></i><div><strong>Main Campus</strong><br>EduMind<br>Knowledge Park, Bengaluru, 560001</div></div>
    <div class="info-row"><i class="fa fa-phone-alt"></i><div><strong>Phone</strong><br>+91 9505293377<br>Mon-Fri, 9am - 5pm</div></div>
    <div class="info-row"><i class="fa fa-envelope"></i><div><strong>Email</strong><br>admissions@edumind.edu<br>hr@edumind.edu</div></div>
  </div>
  <div>
    <h3 style="margin-bottom:20px; font-size:24px;">Send a Message</h3>
    <div class="contact-form">
      <input type="text" placeholder="Full Name" required>
      <input type="email" placeholder="Email Address" required>
      <input type="text" placeholder="Subject">
      <textarea rows="5" placeholder="How can we help you?" required></textarea>
      <button>Submit Inquiry</button>
    </div>
  </div>
</div>
</body>
</html>
